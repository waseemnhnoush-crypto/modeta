<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لـ رتوجتيي ودنيتي من موديتك  💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');
        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans Arabic', sans-serif;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #ff9ff3);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            animation: gradientShift 5s ease infinite;
        }
        @keyframes gradientShift {0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        .container {text-align:center;background:rgba(255,255,255,0.9);padding:50px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.3);max-width:600px;}
        h1 {color:#c44569;font-size:3em;margin:0;text-shadow:2px 2px 4px rgba(0,0,0,0.3);}
        p {font-size:1.5em;color:#333;margin:20px 0;}
        .heart {font-size:4em;animation:heartbeat 1.5s infinite;color:#ff6b9d;}
        @keyframes heartbeat {0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
        button {background:#ff6b9d;color:white;border:none;padding:15px 30px;font-size:1.2em;border-radius:50px;cursor:pointer;margin:10px;transition:all 0.3s;}
        button:hover {transform:scale(1.05);background:#c44569;}
        #message {display:none;font-size:1.3em;color:#c44569;margin-top:20px;}
        #gallery {display:none;margin-top:30px;}
        #gallery img {width:280px;height:280px;border-radius:25px;margin:15px;box-shadow:0 20px 40px rgba(0,0,0,0.3);transition:transform 0.3s;}
        #gallery img:hover {transform:scale(1.05);}
        .stars {position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
        .star {position:absolute;color:white;font-size:20px;animation:twinkle 2s infinite;}
        @keyframes twinkle {0%,100%{opacity:0.3;}50%{opacity:1;}}
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <h1>يا رتوجتي 💖</h1>
        <div class="heart">بحبك</div>
        <p>هالموقع خاص فيكِ من موديتك... اضغطي عشان تشوفي المفاجأة! 🎁</p>
        
        <button onclick="showMessage()">اقرأي الرسالة الحلوة 💌</button>
        <button onclick="showPhotos()">شوفي صورنا الحلوة 📸💕</button>
        
        <div id="message">
            <p>يا حبيبتي، أنتِ كل شي بالدنيا بالنسبة إلي. بحبك كتير كتير ياعيوني !  بوعدك اني حضل معك. 💑</p>
        </div>
        
        <div id="gallery">
            <!-- صورتيك هنا بالضبط! -->
<img src="photo1.jpeg" alt="صورنا واحنا صغار 💕">
<img src="photo2.jpeg" alt="صورنا مع بعض 💑">
        </div>
    </div>

    <script> 
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.innerHTML = '✨';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        function showMessage() {
            document.getElementById('message').style.display = 'block';
        }

        function showPhotos() {
            document.getElementById('gallery').style.display = 'block';
        }
    </script>
</body>
</html>
